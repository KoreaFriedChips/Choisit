<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Choisit">
  <title>Choisit</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #111;
      overflow: hidden;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
    }

    #hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255, 255, 255, 0.25);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.05em;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hint">Tap to join!</div>

  <script>
    // ─── Constants ────────────────────────────────────────────────────────────
    const STILL_THRESHOLD    = 1500;  // ms hold still to start countdown
    const MOVE_THRESHOLD     = 8;     // px movement cancels hold / detects non-tap
    const COUNTDOWN_DURATION = 1500;  // ms arc animation
    const TAP_DURATION       = 300;   // ms max for a quick tap
    const RADIUS             = 50;    // logical px

    const STATES = { IDLE: 0, REGISTERING: 1, COUNTING: 2, SELECTING: 3, RESULT: 4 };

    const COLORS = [
      '#FF3B30', // red
      '#FF9500', // orange
      '#FFCC00', // yellow
      '#34C759', // green
      '#00C7BE', // teal
      '#007AFF', // blue
      '#5856D6', // indigo
      '#AF52DE', // purple
      '#FF2D55', // pink
      '#30B0C7', // cyan
      '#A2845E', // brown
      '#FF6B35', // coral
    ];

    // ─── DOM / globals ────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const hint   = document.getElementById('hint');

    let state          = STATES.IDLE;
    let players        = [];           // persistent player objects, ordered by join time
    let nextPlayerId   = 0;            // monotonic
    let colorCounter   = 0;            // monotonic — fresh color on every new player
    let activeTouches  = new Map();    // touchId → { startX, startY, startTime, x, y, stillSince }
    let holdingTouchId = null;         // which touch triggered COUNTING
    let countdownStart = null;
    let selectingTimeout = null;
    let dpr            = 1;

    // ─── Canvas setup ─────────────────────────────────────────────────────────
    function setupCanvas() {
      dpr = window.devicePixelRatio || 1;
      canvas.width  = window.innerWidth  * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width  = window.innerWidth  + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(dpr, dpr);
    }

    // ─── Reset ────────────────────────────────────────────────────────────────
    function resetGame() {
      players = [];
      activeTouches.clear();
      holdingTouchId = null;
      countdownStart = null;
      state = STATES.IDLE;
      if (selectingTimeout) { clearTimeout(selectingTimeout); selectingTimeout = null; }
      updateHint();
    }

    // ─── Hint ─────────────────────────────────────────────────────────────────
    function updateHint() {
      if (state === STATES.IDLE || (state === STATES.REGISTERING && players.length === 0)) {
        hint.textContent  = 'Tap to join!';
        hint.style.opacity = '1';
      } else if (state === STATES.REGISTERING && players.length >= 1) {
        hint.textContent  = 'Hold to pick!';
        hint.style.opacity = '1';
      } else {
        hint.style.opacity = '0';
      }
    }

    // ─── State transitions ────────────────────────────────────────────────────
    function startCounting(touchId) {
      holdingTouchId = touchId;
      state          = STATES.COUNTING;
      countdownStart = performance.now();
      updateHint();
    }

    function startSelecting() {
      state = STATES.SELECTING;
      players[Math.floor(Math.random() * players.length)].isWinner = true;
      selectingTimeout = setTimeout(() => { state = STATES.RESULT; }, 300);
      updateHint();
    }

    function backToRegistering() {
      state          = STATES.REGISTERING;
      holdingTouchId = null;
      countdownStart = null;
      updateHint();
    }

    // ─── Players ──────────────────────────────────────────────────────────────
    function findPlayerAtPoint(x, y) {
      for (let i = players.length - 1; i >= 0; i--) {
        const p = players[i];
        if (Math.hypot(x - p.x, y - p.y) <= RADIUS) return p;
      }
      return null;
    }

    function addPlayer(x, y) {
      players.push({ id: nextPlayerId++, x, y, color: COLORS[colorCounter++ % COLORS.length], alpha: 1.0, isWinner: false });
      state = STATES.REGISTERING;
      updateHint();
    }

    function removePlayer(player) {
      const idx = players.indexOf(player);
      if (idx !== -1) players.splice(idx, 1);
      if (players.length === 0 && activeTouches.size === 0) state = STATES.IDLE;
      updateHint();
    }

    // ─── Touch handling ───────────────────────────────────────────────────────
    function onTouchStart(e) {
      e.preventDefault();

      if (state === STATES.RESULT || state === STATES.SELECTING) { resetGame(); return; }

      const now = performance.now();
      for (const t of e.changedTouches) {
        activeTouches.set(t.identifier, {
          startX: t.clientX, startY: t.clientY, startTime: now,
          x: t.clientX, y: t.clientY, stillSince: now,
        });
      }

      if (state === STATES.IDLE) { state = STATES.REGISTERING; updateHint(); }
    }

    function onTouchMove(e) {
      e.preventDefault();
      if (state === STATES.RESULT || state === STATES.SELECTING) return;

      for (const t of e.changedTouches) {
        const touch = activeTouches.get(t.identifier);
        if (!touch) continue;
        const dx = t.clientX - touch.x;
        const dy = t.clientY - touch.y;
        touch.x = t.clientX;
        touch.y = t.clientY;
        if (Math.hypot(dx, dy) > MOVE_THRESHOLD) {
          touch.stillSince = performance.now();
          if (state === STATES.COUNTING && t.identifier === holdingTouchId) {
            backToRegistering();
          }
        }
      }
    }

    function onTouchEnd(e) {
      e.preventDefault();

      if (state === STATES.RESULT || state === STATES.SELECTING) { resetGame(); return; }

      const now = performance.now();
      for (const t of e.changedTouches) {
        const touch = activeTouches.get(t.identifier);
        if (touch) {
          const duration   = now - touch.startTime;
          const dist       = Math.hypot(t.clientX - touch.startX, t.clientY - touch.startY);
          const isQuickTap = duration < TAP_DURATION && dist < MOVE_THRESHOLD;

          if (isQuickTap) {
            const hit = findPlayerAtPoint(touch.startX, touch.startY);
            if (hit) removePlayer(hit);
            else     addPlayer(touch.startX, touch.startY);
          } else if (state === STATES.COUNTING && t.identifier === holdingTouchId) {
            backToRegistering();
          }
        }
        activeTouches.delete(t.identifier);
      }

      if (players.length === 0 && activeTouches.size === 0) { state = STATES.IDLE; updateHint(); }
    }

    // ─── Draw loop ────────────────────────────────────────────────────────────
    function draw(now) {
      requestAnimationFrame(draw);
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      // REGISTERING: check for a still touch → start counting
      if (state === STATES.REGISTERING && players.length >= 1) {
        for (const [id, touch] of activeTouches) {
          if (now - touch.stillSince >= STILL_THRESHOLD) { startCounting(id); break; }
        }
      }

      // COUNTING: check completion
      if (state === STATES.COUNTING && now - countdownStart >= COUNTDOWN_DURATION) {
        startSelecting();
      }

      // Draw persistent player circles
      for (const p of players) drawPlayer(p, now);

      // Draw hold-trigger countdown arc at the held touch position
      if (state === STATES.COUNTING && holdingTouchId !== null) {
        const ht = activeTouches.get(holdingTouchId);
        if (ht) {
          const progress = Math.min((now - countdownStart) / COUNTDOWN_DURATION, 1);
          drawCountingCircle(ht.x, ht.y, '#FFFFFF', progress, now);
        }
      }
    }

    function drawPlayer(p, now) {
      ctx.save();
      ctx.globalAlpha = p.alpha;

      if (state === STATES.RESULT) {
        if (p.isWinner) {
          drawWinner(p.x, p.y, p.color, now);
        } else {
          p.alpha = Math.max(0, p.alpha - 0.03);
          ctx.globalAlpha = p.alpha;
          drawOutlineCircle(p.x, p.y, p.color);
        }
      } else if (state === STATES.SELECTING) {
        const pulse = 0.5 + 0.5 * Math.sin(now * 0.03);
        ctx.globalAlpha = p.alpha * (0.6 + 0.4 * pulse);
        drawFilledCircle(p.x, p.y, p.color);
      } else {
        // REGISTERING or COUNTING — outline ring + center dot
        drawOutlineCircle(p.x, p.y, p.color);
      }

      ctx.restore();
    }

    function drawOutlineCircle(x, y, col) {
      ctx.beginPath();
      ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
      ctx.strokeStyle = col;
      ctx.lineWidth = 4;
      ctx.stroke();

      // Small center dot
      ctx.beginPath();
      ctx.arc(x, y, 6, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.fill();
    }

    function drawFilledCircle(x, y, col) {
      ctx.beginPath();
      ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.fill();
    }

    function drawCountingCircle(x, y, col, progress, now) {
      // Background ring
      ctx.beginPath();
      ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
      ctx.strokeStyle = hexToRgba(col, 0.2);
      ctx.lineWidth = 4;
      ctx.stroke();

      // Shrinking arc: starts full, sweeps away as progress increases
      const remaining = 1 - progress;
      const endAngle  = -Math.PI / 2 + remaining * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(x, y, RADIUS, -Math.PI / 2, endAngle);
      ctx.strokeStyle = col;
      ctx.lineWidth   = 5;
      ctx.lineCap     = 'round';
      ctx.stroke();

      // Subtle pulse ring
      const pulsePhase = (now % 900) / 900;
      const pulseR     = RADIUS + 10 + pulsePhase * 20;
      const pulseA     = (1 - pulsePhase) * 0.35;
      ctx.beginPath();
      ctx.arc(x, y, pulseR, 0, Math.PI * 2);
      ctx.strokeStyle = hexToRgba(col, pulseA);
      ctx.lineWidth   = 2;
      ctx.stroke();

      // Center dot
      ctx.beginPath();
      ctx.arc(x, y, 6, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.fill();
    }

    function drawWinner(x, y, col, now) {
      // Expanding pulse rings
      const t = (now % 1200) / 1200;
      for (let i = 0; i < 3; i++) {
        const phase = (t + i / 3) % 1;
        const r     = RADIUS + phase * 60;
        const a     = (1 - phase) * 0.5;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.strokeStyle = hexToRgba(col, a);
        ctx.lineWidth   = 3;
        ctx.stroke();
      }

      // Solid filled circle
      ctx.beginPath();
      ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.fill();

      // Star overlay
      ctx.fillStyle    = 'rgba(255,255,255,0.9)';
      ctx.font         = `bold ${Math.round(RADIUS * 0.75)}px -apple-system, sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', x, y + 1);
    }

    // ─── Utility ──────────────────────────────────────────────────────────────
    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    // ─── Boot ─────────────────────────────────────────────────────────────────
    setupCanvas();
    updateHint();
    requestAnimationFrame(draw);

    document.addEventListener('touchstart',  onTouchStart,  { passive: false });
    document.addEventListener('touchmove',   onTouchMove,   { passive: false });
    document.addEventListener('touchend',    onTouchEnd,    { passive: false });
    document.addEventListener('touchcancel', onTouchEnd,    { passive: false });

    window.addEventListener('resize', () => {
      setupCanvas();
      resetGame();
    });

    window.addEventListener('orientationchange', () => {
      setTimeout(() => { setupCanvas(); resetGame(); }, 100);
    });
  </script>
</body>
</html>
